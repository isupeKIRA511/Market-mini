<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- Top App Bar -->
<header class="bg-[#fef8f9] dark:bg-[#1D1B1C] flex flex-row-reverse justify-between items-center w-full px-6 py-4 fixed top-0 z-50">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden outline outline-2 outline-primary-container/20">
<img alt="صورة الملف الشخصي" class="w-full h-full object-cover" data-alt="professional headshot of a middle-eastern man in a sharp suit, warm studio lighting, minimalist gray background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBSubXzNnZYQgADtCsw5loAjVBwsDQ29rIAETsuqeWve0cY0yq8VMpt0JaVB9_W8Hq-Q6zRz3AQOUtnKrktEezoOW7xUSE4CPJOooAlErp8rI7dyLFB8A57Ht-Na0WW1c60qX-O6vq7qqJAhaVhRyDqmKlf3foAjjCSaXzY-ju-SId9inyl5DXjn_plph7aY_k6EGThVlnyuYt3EcqymSA2rXwUT049PKpwQjSrzGxD04wyPCLrOCV0JOibw0v1HZMyzLyZM99klR-Y"/>
</div>
</div>
<h1 class="font-['Inter'] font-bold text-2xl text-[#1D1B1C] dark:text-white">الرئيسية</h1>
<button class="transition-all duration-300 active:scale-95 text-[#795900] dark:text-[#FAC445]">
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Welcome Section -->
<section class="mb-10">
<h2 class="text-on-surface-variant text-sm font-medium mb-1">أهلاً بك،</h2>
<p class="text-4xl font-black text-on-surface tracking-tight">أين وجهتك اليوم؟</p>
</section>
<!-- Service Selection Cards (Bento-style layout) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- To the Airport -->
<button class="group relative overflow-hidden bg-primary-container rounded-[24px] p-8 text-right flex flex-col justify-between h-[240px] md:col-span-2 transition-all duration-300 active:scale-[0.98]">
<div class="z-10">
<h3 class="text-3xl font-black text-on-primary-container mb-2">إلى المطار</h3>
<p class="text-on-primary-container/80 font-medium">حجز رحلة مغادرة مريحة</p>
</div>
<div class="absolute -left-12 -bottom-12 opacity-20 group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined text-[200px]" style="font-variation-settings: 'FILL' 1;">flight_takeoff</span>
</div>
<div class="z-10 self-start">
<div class="bg-on-primary-container text-primary-container px-6 py-2 rounded-full font-bold text-sm">
                        احجز الآن
                    </div>
</div>
</button>
<!-- From the Airport -->
<button class="group relative overflow-hidden bg-surface-container-lowest border border-outline-variant/15 rounded-[24px] p-6 text-right flex flex-col justify-between h-[200px] transition-all duration-300 active:scale-[0.98] shadow-[0_4px_20px_rgba(29,27,28,0.02)]">
<div class="z-10">
<h3 class="text-2xl font-bold text-on-surface mb-1">من المطار</h3>
<p class="text-on-surface-variant text-sm">توصيل من صالة الوصول</p>
</div>
<div class="absolute -left-4 -bottom-4 text-primary-container/10 group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined text-[120px]" style="font-variation-settings: 'FILL' 1;">flight_land</span>
</div>
<div class="z-10 self-start">
<div class="bg-surface-container text-on-surface-variant w-10 h-10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">chevron_left</span>
</div>
</div>
</button>
<!-- City to City -->
<button class="group relative overflow-hidden bg-surface-container-lowest border border-outline-variant/15 rounded-[24px] p-6 text-right flex flex-col justify-between h-[200px] transition-all duration-300 active:scale-[0.98] shadow-[0_4px_20px_rgba(29,27,28,0.02)]">
<div class="z-10">
<h3 class="text-2xl font-bold text-on-surface mb-1">بين المحافظات</h3>
<p class="text-on-surface-variant text-sm">سفر آمن للمسافات البعيدة</p>
</div>
<div class="absolute -left-4 -bottom-4 text-primary-container/10 group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined text-[120px]" style="font-variation-settings: 'FILL' 1;">distance</span>
</div>
<div class="z-10 self-start">
<div class="bg-surface-container text-on-surface-variant w-10 h-10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">chevron_left</span>
</div>
</div>
</button>
</div>
<!-- Recent Destinations / Promotions -->
<div class="mt-12">
<div class="flex items-center justify-between mb-6">
<h4 class="font-bold text-xl text-on-surface">العروض الحصرية</h4>
<button class="text-primary font-bold text-sm">عرض الكل</button>
</div>
<div class="overflow-x-auto flex gap-4 pb-4 no-scrollbar">
<div class="min-w-[280px] h-[160px] relative rounded-[24px] overflow-hidden">
<img class="w-full h-full object-cover" data-alt="luxury black airport shuttle bus driving through a modern airport terminal at twilight, golden hour lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDHf9f_zsGpTCNAspQCyaTP56etBUwq-GcTByFLHOqCLe-PRtztoL-FBweFnj9FOH-IuGbrgEi_S7wlQSfDWevo9M4B7-UAYaqnNlpqy0vrEFcWYOhrCeal001o19UMeNNaPirtOoSI4RecRI7h4EkHJIi3j5Y097RYewHBQjc1kfxVtmZ_RItdLLyRoaySTL7ILRndqnewU1f_EyAbLzTXhGMiMIx_imYDZqiEgUwZybIJd6A_9H3azp4pT62CIlGUzavz59DhoRMK"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent p-6 flex flex-col justify-end">
<p class="text-white font-bold text-lg leading-tight">خصم 20% على الرحلات الجماعية</p>
</div>
</div>
<div class="min-w-[280px] h-[160px] relative rounded-[24px] overflow-hidden">
<img class="w-full h-full object-cover" data-alt="modern airport terminal architecture with high ceilings and vast glass walls during sunrise" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDz72ZIzCZcz4qdl4MI9mCEA2I5XwfcCitKjQAEab1zI9oMSAzfyGZQ4pMR-6eydO-pAarcJ_333bBQPchiP25tqxRZd4_BDq3476AW44c8-ARO82JFWWlR-rnmmRZYmkp_7mGSxdLbOwXreQhmRUXHgJLiYdj7Y7Fnx9Uaac-O5PAwR5mdeelHJvZBXeNdBX1Qcb9X815YOeeGDxmGZPy0VKq0xqGNpNfRPdyGZWJtV-gQBaMJZDwBAWVCUVUe2nEKHfffMmV1ST_F"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent p-6 flex flex-col justify-end">
<p class="text-white font-bold text-lg leading-tight">خدمة المساعدة في الأمتعة مجاناً</p>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex flex-row-reverse justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-[#1D1B1C]/80 backdrop-blur-xl border-t border-[#d2c5ae]/15 shadow-[0_-4px_20px_rgba(29,27,28,0.04)] rounded-t-3xl">
<a class="transition-transform duration-200 active:scale-90 flex flex-col items-center justify-center bg-[#FAC445] text-[#1D1B1C] rounded-2xl px-5 py-2" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-['Inter'] text-[12px] font-medium mt-1">الرئيسية</span>
</a>
<a class="transition-transform duration-200 active:scale-90 flex flex-col items-center justify-center text-[#4f4635] dark:text-[#d2c5ae] px-5 py-2 hover:text-[#795900] dark:hover:text-[#FAC445]" href="#">
<span class="material-symbols-outlined">directions_car</span>
<span class="font-['Inter'] text-[12px] font-medium mt-1">حجوزاتي</span>

<a class="transition-transform duration-200 active:scale-90 flex flex-col items-center justify-center text-[#4f4635] dark:text-[#d2c5ae] px-5 py-2 hover:text-[#795900] dark:hover:text-[#FAC445]" href="#">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="font-['Inter'] text-[12px] font-medium mt-1">المحفظة</span>
</a>
<a class="transition-transform duration-200 active:scale-90 flex flex-col items-center justify-center text-[#4f4635] dark:text-[#d2c5ae] px-5 py-2 hover:text-[#795900] dark:hover:text-[#FAC445]" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-['Inter'] text-[12px] font-medium mt-1">الحساب</span>
